<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>WCP360 - User Accounts</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans">
    <div class="max-w-6xl mx-auto p-10">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-bold">List Accounts</h1>
            <button class="bg-blue-600 px-6 py-2 rounded-lg font-bold">+ Create New Account</button>
        </div>

        <div class="bg-slate-800 rounded-2xl overflow-hidden border border-slate-700">
            <table class="w-full text-left">
                <thead class="bg-slate-700/50 text-slate-400 text-xs uppercase">
                    <tr>
                        <th class="p-4">Domain</th>
                        <th class="p-4">User</th>
                        <th class="p-4">IP Address</th>
                        <th class="p-4">Disk Used</th>
                        <th class="p-4">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-700">
                    <tr class="hover:bg-slate-700/30 transition">
                        <td class="p-4 font-bold">example.com</td>
                        <td class="p-4 text-blue-400">user01</td>
                        <td class="p-4 text-slate-400">192.168.1.10</td>
                        <td class="p-4">250MB / 2GB</td>
                        <td class="p-4">
                            <button class="text-xs bg-slate-600 px-3 py-1 rounded">Login to Panel</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
