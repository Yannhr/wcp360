<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>WCP360 - Admin Root</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-10">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-blue-500 mb-8 underline">WCP360 : Gestionnaire Root</h1>

        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 mb-10 shadow-lg">
            <h2 class="text-xl font-bold mb-4 text-green-400">Créer un nouveau compte client</h2>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="u" placeholder="Utilisateur (ex: steve)" class="bg-slate-800 p-2 rounded border border-slate-700">
                <input type="text" id="d" placeholder="Domaine (ex: steve.com)" class="bg-slate-800 p-2 rounded border border-slate-700">
                <input type="password" id="p" placeholder="Mot de passe" class="bg-slate-800 p-2 rounded border border-slate-700">
                <button onclick="create()" class="bg-blue-600 hover:bg-blue-500 font-bold py-2 rounded">CRÉER LE COMPTE</button>
            </div>
        </div>

        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
            <h2 class="text-xl font-bold mb-4">Comptes actifs sur le serveur</h2>
            <div id="list" class="space-y-3"></div>
        </div>
    </div>

    <script>
        async function load() {
            const res = await fetch('/api/admin/accounts');
            const data = await res.json();
            const list = document.getElementById('list');
            list.innerHTML = '';
            data.forEach(acc => {
                list.innerHTML += `
                <div class="flex justify-between items-center bg-slate-800 p-3 rounded border border-slate-700">
                    <span><strong>${acc.domain}</strong> (${acc.username})</span>
                    <span class="text-green-500 font-mono text-xs uppercase">● En ligne</span>
                </div>`;
            });
        }

        async function create() {
            const payload = {
                username: document.getElementById('u').value,
                domain: document.getElementById('d').value,
                password: document.getElementById('p').value,
                quota: "1000"
            };
            const res = await fetch('/api/admin/accounts/create', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if(res.ok) { alert('Compte créé !'); load(); }
            else { alert('Erreur lors de la création'); }
        }
        load();
    </script>
</body>
</html>
