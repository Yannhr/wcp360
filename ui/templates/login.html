<!DOCTYPE html>
<html>
<head><title>Login WCP360</title></head>
<body style="background:#111; color:white; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh;">
    <div style="background:#222; padding:2rem; border-radius:10px;">
        <h2>WCP360 - Connexion Root</h2>
        <input type="text" id="u" placeholder="Utilisateur" style="display:block; margin-bottom:10px; padding:10px; width:100%;">
        <input type="password" id="p" placeholder="Mot de passe" style="display:block; margin-bottom:10px; padding:10px; width:100%;">
        <button onclick="doLogin()" style="width:100%; padding:10px; background:blue; color:white; border:none; cursor:pointer;">Se connecter</button>
    </div>
    <script>
        async function doLogin() {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: document.getElementById('u').value, password: document.getElementById('p').value})
            });
            const data = await res.json();
            if(res.ok) {
                localStorage.setItem('token', data.token);
                window.location.href = '/admin';
            } else { alert('Erreur !'); }
        }
    </script>
</body>
</html>
