<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>WCP360 - Dashboard Client</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-sans">
    <nav class="bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-500">WCP360 <span class="text-slate-500 text-sm">| Client</span></h1>
        <button onclick="location.href='/login'" class="text-red-500 text-sm">Déconnexion</button>
    </nav>

    <div class="max-w-6xl mx-auto p-8">
        <div class="flex justify-between items-end mb-8">
            <h2 class="text-3xl font-bold">Gestionnaire de Fichiers</h2>
            <p class="text-slate-500">Dossier actuel: <span class="text-blue-400">/public_html</span></p>
        </div>

        <div class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden shadow-2xl">
            <div class="bg-slate-800/50 p-4 border-b border-slate-800 flex gap-4">
                <button onclick="loadFiles()" class="bg-blue-600 hover:bg-blue-500 px-4 py-1 rounded text-sm font-bold transition">Actualiser</button>
                <button class="bg-slate-700 px-4 py-1 rounded text-sm hover:bg-slate-600 transition">Nouveau Dossier</button>
            </div>
            
            <div id="file-list" class="p-4 grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="animate-pulse text-slate-600 text-center col-span-4 py-10">Lecture du disque...</div>
            </div>
        </div>
    </div>

    <script>
        async function loadFiles() {
            const container = document.getElementById('file-list');
            try {
                const res = await fetch('/api/user/files?user=admin');
                const files = await res.json();
                
                container.innerHTML = '';
                if (files.length === 0) {
                    container.innerHTML = '<p class="col-span-4 text-center text-slate-500">Le dossier est vide.</p>';
                    return;
                }

                files.forEach(file => {
                    const icon = file.is_dir ? '📁' : '📄';
                    const size = file.is_dir ? '--' : (file.size / 1024).toFixed(2) + ' KB';
                    
                    container.innerHTML += `
                        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 hover:border-blue-500 cursor-pointer transition flex flex-col items-center">
                            <span class="text-4xl mb-2">${icon}</span>
                            <span class="text-sm font-medium truncate w-full text-center">${file.name}</span>
                            <span class="text-[10px] text-slate-500 mt-1 uppercase">${size}</span>
                        </div>
                    `;
                });
            } catch (err) {
                container.innerHTML = '<p class="col-span-4 text-red-500">Erreur de connexion au serveur.</p>';
            }
        }

        // Charger au démarrage
        loadFiles();
    </script>
</body>
</html>
